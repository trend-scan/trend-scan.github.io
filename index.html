<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Preconnect to key API origins — saves DNS + TLS round-trips on first fetch -->
    <link rel="preconnect" href="https://api.hyperliquid.xyz" />
    <link rel="preconnect" href="https://api.coingecko.com" />
    <link rel="preconnect" href="https://www.okx.com" />
    <link rel="preconnect" href="https://api.bybit.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.binance.com" />
    <link rel="dns-prefetch" href="https://fapi.binance.com" />
    <link rel="dns-prefetch" href="https://mainnet.zklighter.elliot.ai" />

    <!-- Google Fonts — loaded via <link> instead of CSS @import to avoid
         serial render-blocking chain (CSS → @import → font CSS → font files) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" />

    <!-- Favicon (multi-size ICO + PNG fallbacks) -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- Apple touch icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Safari pinned-tab icon (monochrome SVG silhouette) -->
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#06090f" />

    <!-- Windows / Edge tiles -->
    <meta name="msapplication-TileColor" content="#06090f" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Web app manifest (PWA install) -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06090f" />
    <meta name="description" content="Multi-source crypto + tradfi market scanner with macro regime monitoring. Real-time data from 8+ exchanges, no API key required." />

    <!-- SEO: canonical URL + sitemap discovery -->
    <link rel="canonical" href="https://trend-scan.github.io/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Additional metadata -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="TrendScan" />
    <meta name="keywords" content="crypto scanner, crypto screener, tradfi, macro regime, bitcoin, ethereum, solana, market board, defi, rwa, ai tokens" />

    <!--
      Content-Security-Policy: restricts what the browser is allowed to load
      and execute. Defends against XSS injection by whitelisting origins.

      Directives:
        default-src 'self'                       — fallback for any directive not listed
        script-src                               — JS sources (Vite bundle + Cloudflare Insights beacon)
        style-src                                — CSS sources (Vite bundle + Google Fonts CSS @import + unsafe-inline for runtime styles)
        font-src                                 — Google Fonts static files
        img-src                                  — images: self, data: URIs, https: for OG/twitter card images
        frame-src                                — TradingView chart iframe (www.tradingview-widget.com)
        connect-src                              — runtime fetch() / XHR endpoints (all exchange + macro + treasury APIs)
        worker-src                               — Web Workers (none currently, but allowed from self for future use)
        frame-ancestors 'none'                   — prevent clickjacking (no embedding) — NOTE: ignored via meta, needs HTTP header
        base-uri 'self'                          — prevent <base> tag injection
        form-action 'self'                       — prevent form submissions to external origins
        object-src 'none'                        — no Flash/Java/plugins
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://static.cloudflareinsights.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      frame-src https://www.tradingview.com https://s.tradingview.com;
      connect-src 'self'
        https://api.hyperliquid.xyz
        https://api.bybit.com
        https://api.coingecko.com
        https://api.coincap.io
        https://api.binance.com
        https://fapi.binance.com
        https://www.okx.com
        https://mainnet.zklighter.elliot.ai
        https://api.polygon.io
        https://api.massive.com
        https://api.twelvedata.com
        https://api.kraken.com
        https://api.alternative.me
        https://api.fiscaldata.treasury.gov
        https://fiscaldata.treasury.gov
        https://www.alphavantage.co
        https://cloudflareinsights.com
        https://static.cloudflareinsights.com
        https://trendscan-yahoo-proxy.drew-724.workers.dev;
      worker-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    " />

    <!-- Open Graph / social media cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrendScan" />
    <meta property="og:title" content="TrendScan — Crypto + Tradfi Market Scanner" />
