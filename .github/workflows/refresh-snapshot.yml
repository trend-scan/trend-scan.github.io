# TrendScan — Snapshot Refresh (4× daily, 7 days/week)
#
# This is a lightweight workflow that ONLY refreshes the snapshot data.
# It commits snapshot.json (small, ~450KB) to main, then pushes
# snapshot.tradfi.json (large, ~13MB) DIRECTLY to the gh-pages branch,
# bypassing main entirely. This prevents Git repository bloat — committing
# a 13MB file 4× daily to main would add ~52MB/day to .git history.
#
# Why split the commit targets?
#   - snapshot.json is small and useful for first-paint — commit to main
#     so it's version-controlled with the code.
#   - snapshot.tradfi.json is large and purely data — push to gh-pages
#     (deployed branch) without polluting main's history.
#
# Schedule: 04:00, 10:00, 16:00, 22:00 UTC (7 days a week, every 6 hours)
#   - 04:00 UTC = 12am ET (catches overnight ETF flow data from Farside)
#   - 10:00 UTC = 6am ET (pre-market; catches FRED 10am ET daily publish)
#   - 16:00 UTC = 12pm ET (midday — captures US market session)
#   - 22:00 UTC = 6pm ET (after US close — captures close-of-day data)
#   - Runs every day including Sunday — even though US markets are closed
#     on weekends, FRED/Farside/CoinGecko publish data throughout the
#     weekend, and crypto markets never close. This ensures the snapshot
#     is always fresh for Monday morning users.

name: Refresh FRED Snapshot

on:
  schedule:
    # 04:00, 10:00, 16:00, 22:00 UTC = 12am, 6am, 12pm, 6pm ET (every 6 hours)
    # 7 days a week. Crypto markets never close; FRED/Farside publish
    # weekend data that we want to capture for Monday morning users.
    #
    # ⚠️ GITHUB ACTIONS CRON CAVEAT (verified July 2026):
    # Scheduled workflows are QUEUED, not run at the exact cron time.
    # Observed delays: 30min to 6h+ depending on GitHub load.
    # The 04:00 UTC run is consistently delayed by 5-6h (often fires ~09-10 UTC).
    # The 10:00/16:00/22:00 runs are usually delayed 30-90min.
    # GitHub may also DROP scheduled runs entirely during peak load — we've
    # observed days with only 1 of 4 expected runs actually firing.
    #
    # Mitigation:
    #   1. The concurrency group below prevents overlapping runs (which caused
    #      gh-pages push failures in July 2026 — 10/45 runs failed before fix).
    #   2. The alert-on-failure job opens a GitHub Issue when runs fail, so
    #      missing data is surfaced quickly rather than silently going stale.
    #   3. The FreshnessBanner component (src/components/FreshnessBanner.jsx)
    #      shows users an in-product warning when the snapshot is >6h old.
    #
    # If delays become unacceptable, options:
    #   - Move to a self-hosted runner with cron
    #   - Use a third-party scheduler (cron-job.org, EasyCron) hitting
    #     workflow_dispatch via the GitHub API
    #   - Move snapshot fetching to a Cloudflare Worker cron trigger
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:

# Prevent concurrent refresh runs — the gh-pages push step is not atomic
# and two runs checking out gh-pages simultaneously caused 22% of runs to
# fail in July 2026. cancel-in-progress=false means the queued run will
# wait for the current one to finish (rather than cancelling it, which
# would leave the snapshot in a half-committed state).
concurrency:
  group: 'snapshot-refresh'
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  issues: write     # needed to open issues on CI failure (alerting)

jobs:
  refresh:
    name: Fetch fresh FRED data
    runs-on: ubuntu-latest
    # The cron schedule runs 7 days a week (0-6). workflow_dispatch always runs.
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for cross-branch push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build fresh snapshot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/build_snapshot.js

      - name: Check for changes (snapshot.json on main)
        id: diff
        run: |
          if git diff --quiet public/snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in snapshot.json."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "snapshot.json has new updates."
          fi

      - name: Commit snapshot.json to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/snapshot.json
          git commit -m "chore(data): refresh snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
          echo "Pushed snapshot.json to main."

      # ── Push snapshot.tradfi.json directly to gh-pages ─────────────────────
      # This avoids committing the 13MB file to main's history. The gh-pages
      # branch is the deployed branch — it's force-pushed on every deploy
      # anyway, so its history is ephemeral. Main's history stays clean.
      #
      # RETRY LOGIC: The gh-pages push was the #1 failure point in July 2026
      # (10/45 runs failed here). Root causes were:
      #   1. Concurrent runs racing on `git checkout gh-pages` (fixed by the
      #      concurrency group at the top of this workflow)
      #   2. Transient git push failures (network blips, GitHub API rate limits)
      # We now retry the push up to 3 times with exponential backoff.
      - name: Push snapshot.tradfi.json to gh-pages
        id: push_tradfi
        continue-on-error: true
        run: |
          set -e
          # Check if snapshot.tradfi.json changed
          if git diff --quiet public/snapshot.tradfi.json; then
            echo "No changes in snapshot.tradfi.json."
            exit 0
          fi

          # Configure git
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Copy files to temp BEFORE switching branches (public/ won't exist on gh-pages)
          cp public/snapshot.tradfi.json /tmp/snapshot.tradfi.json
          cp public/snapshot.json /tmp/snapshot.json

          # Fetch existing gh-pages branch (if it exists)
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git stash --include-untracked || true
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
          else
            # gh-pages doesn't exist yet — create it as an orphan branch
            git stash --include-untracked || true
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            touch .nojekyll
          fi

          # Copy from temp (files are safe here, not dependent on main's directory structure)
          cp /tmp/snapshot.tradfi.json snapshot.tradfi.json
          cp /tmp/snapshot.json snapshot.json 2>/dev/null || true
          touch .nojekyll

          git add snapshot.tradfi.json snapshot.json .nojekyll
          git commit -m "chore(data): refresh tradfi snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Retry push up to 3 times with exponential backoff
          # (handles transient network failures + GitHub API hiccups)
          for attempt in 1 2 3; do
            if git push origin gh-pages; then
              echo "✓ Pushed snapshot.tradfi.json to gh-pages on attempt $attempt"
              echo "pushed=true" >> $GITHUB_OUTPUT
              # Switch back to main and restore stashed changes
              git checkout main
              git stash pop || true
              exit 0
            else
              echo "⚠ Push attempt $attempt failed, retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
              # Re-fetch in case gh-pages moved during the failed push
              git fetch origin gh-pages:gh-pages --force 2>/dev/null || true
              # Rebase our commit on top of the latest gh-pages
              git rebase origin/gh-pages 2>/dev/null || true
            fi
          done

          echo "✗ All 3 push attempts failed"
          echo "pushed=false" >> $GITHUB_OUTPUT
          # Switch back to main even on failure (so subsequent steps don't break)
          git checkout main 2>/dev/null || true
          git stash pop 2>/dev/null || true
          exit 1

      - name: Warn if gh-pages push failed (non-blocking)
        if: steps.push_tradfi.outcome == 'failure'
        run: |
          echo "⚠️ snapshot.tradfi.json push failed after 3 retries." >> $GITHUB_STEP_SUMMARY
          echo "The snapshot.json was committed to main, but the tradfi snapshot" >> $GITHUB_STEP_SUMMARY
          echo "(13MB) was NOT pushed to gh-pages. The live site will continue" >> $GITHUB_STEP_SUMMARY
          echo "serving the previous tradfi snapshot until the next successful run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is non-blocking — the next scheduled run will retry." >> $GITHUB_STEP_SUMMARY

      - name: Trigger deploy
        if: steps.diff.outputs.changed == 'true'
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            // Dispatch the deploy workflow and record the time so we can
            // poll for the resulting run in the next step.
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            // Record dispatch time so the verify step can find the new run
            core.setOutput('dispatched_at', new Date().toISOString());

      - name: Verify deploy workflow started
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Poll the deploy workflow runs to confirm our dispatch actually
            // started a run. This catches the failure mode where workflow_dispatch
            // returns 204 but no run is created (e.g. due to a syntax error in
            // deploy.yml or a concurrency-group cancel).
            const dispatchedAt = '${{ steps.trigger.outputs.dispatched_at }}';
            const dispatchedTime = new Date(dispatchedAt).getTime();
            const workflowId = 'deploy.yml';

            // Give the workflow dispatcher a moment to register the run
            await new Promise(r => setTimeout(r, 5000));

            let foundRun = null;
            for (let attempt = 0; attempt < 6; attempt++) {
              const res = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                status: 'queued',  // looking for newly queued runs
                created: `>=${dispatchedAt}`,
              });
              if (res.data.workflow_runs.length > 0) {
                foundRun = res.data.workflow_runs[0];
                break;
              }
              // Also check in_progress (it may have already started)
              const res2 = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                status: 'in_progress',
                created: `>=${dispatchedAt}`,
              });
              if (res2.data.workflow_runs.length > 0) {
                foundRun = res2.data.workflow_runs[0];
                break;
              }
              await new Promise(r => setTimeout(r, 10000));
            }

            if (foundRun) {
              console.log(`✓ Deploy workflow run #${foundRun.run_number} started (id: ${foundRun.id})`);
              console.log(`  URL: ${foundRun.html_url}`);
            } else {
              core.warning('Could not confirm deploy workflow started within 65s. ' +
                'The dispatch may have been cancelled by the concurrency group or failed to register. ' +
                'Check https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/workflows/deploy.yml manually.');
            }

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" == "true" ]; then
            echo "### Snapshot Refreshed ✅" >> $GITHUB_STEP_SUMMARY
            echo "- snapshot.json committed to main" >> $GITHUB_STEP_SUMMARY
            echo "- snapshot.tradfi.json pushed to gh-pages (bypassing main to avoid history bloat)" >> $GITHUB_STEP_SUMMARY
            echo "- deploy workflow triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No Changes ⏸" >> $GITHUB_STEP_SUMMARY
            echo "Snapshot data is already current. No commit made." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Failure alerting ─────────────────────────────────────────────────────
  # Same pattern as deploy.yml: open (or comment on) a GitHub Issue with the
  # "ci-failure" label so silent data staleness can't slip through. Critical
  # for the 4× daily refresh — without this, a multi-day FRED outage would
  # leave the macro page serving stale data with no notification.
  alert-on-failure:
    name: Open GitHub Issue on failure
    runs-on: ubuntu-latest
    needs: refresh
    if: always() && needs.refresh.result == 'failure'
    permissions:
      issues: write
      actions: read
    steps:
      - name: Find or open issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'ff4444',
                  description: 'CI workflow failed — needs investigation',
                });
              } else { throw e; }
            }

            // Look for existing OPEN issue with ci-failure label
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: label, state: 'open', per_page: 10,
            });

            const body = [
              `**Workflow:** [${context.workflow}](${runUrl})`,
              ``,
              `**Run:** #${context.runNumber}`,
              `**Trigger:** ${context.eventName} on \`${context.ref}\``,
              `**Failed at:** ${timestamp}`,
              ``,
              `**Failure context:**`,
              `- The snapshot refresh job failed. The most likely cause is an upstream API outage (FRED, CoinGecko, Farside) or a network timeout during \`build_snapshot.js\`.`,
              `- If this is the first failure, the snapshot is still fresh from the previous run. After 2+ consecutive failures (12h+), the live site will be serving stale data — check the "As of" timestamp on the Macro page.`,
              ``,
              `**To resolve:**`,
              `1. Open the run URL and check which step failed.`,
              `2. If it's a transient API outage, re-run the workflow manually from the Actions tab.`,
              `3. If it's a code error (e.g. schema change in upstream data), patch \`build_snapshot.js\` and push.`,
              `4. Close this issue once a green run completes.`,
              ``,
              `> Auto-generated by TrendScan CI failure alerting (refresh-snapshot.yml).`,
            ].join('\n');

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              const comment = [
                `### ⚠️ Refresh failure recurrence — ${timestamp}`,
                ``,
                `Workflow [${context.workflow}](${runUrl}) run #${context.runNumber} failed.`,
                `Original issue #${issue.number} remains open.`,
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, body: comment,
              });
              console.log(`Commented on existing issue #${issue.number}`);
            } else {
              const title = `CI failure: ${context.workflow} run #${context.runNumber}`;
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              console.log(`Opened new issue #${newIssue.data.number}: ${newIssue.data.html_url}`);
            }

