# TrendScan — Build & Deploy to GitHub Pages
#
# Triggers:
#   1. Push to main (any change to src/, scripts/, public/, index.html, etc.)
#   2. Daily at 22:00 UTC (after US market close) — refreshes the FRED snapshot
#   3. Manual dispatch from the Actions tab
#
# What it does:
#   1. Installs Node + deps
#   2. Runs scripts/build_snapshot.js — fetches FRED macro data server-side
#      using the FRED_API_KEY secret, writes public/snapshot.json
#   3. Runs npm run build — Vite builds the production bundle to dist/
#   4. Copies snapshot.json into dist/ (so it's served at /snapshot.json)
#   5. Pushes dist/ contents to the gh-pages branch (deploying the live site)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   FRED_API_KEY  — free key from https://fred.stlouisfed.org/docs/api/api_key.html

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.js'
      - '.github/workflows/deploy.yml'
  schedule:
    # 22:00 UTC daily = 6pm ET (after US market close)
    # FRED publishes daily series around 10am ET, so this catches them
    - cron: '0 22 * * *'
  workflow_dispatch:

# Don't run concurrent deploys for the same ref
concurrency:
  group: 'pages-deploy'
  cancel-in-progress: true

permissions:
  contents: write   # needed to push to gh-pages branch
  pages: write
  id-token: write

jobs:
  build:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to push back to gh-pages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (non-blocking)
        run: npm run lint || echo "⚠ Lint warnings (non-blocking)"

      - name: Typecheck (non-blocking)
        run: npm run typecheck || echo "⚠ Typecheck warnings (non-blocking)"

      - name: CSP verification (non-blocking)
        # Verifies every external URL referenced in src/ is allowed by the
        # Content-Security-Policy in index.html. Catches the regression where
        # someone adds a new API endpoint but forgets to update the CSP.
        run: python3 scripts/verify-csp.py || echo "⚠ CSP verification warnings (non-blocking)"

      - name: Build FRED snapshot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/build_snapshot.js

      - name: Build site (Vite)
        env:
          # Inject the Massive key at build time only if provided (otherwise
          # resolver uses free sources). Optional secret.
          VITE_MASSIVE_API_KEY: ${{ secrets.VITE_MASSIVE_API_KEY }}
          VITE_ALPHAVANTAGE_KEY: ${{ secrets.VITE_ALPHAVANTAGE_KEY }}
          VITE_TWELVEDATA_KEY: ${{ secrets.VITE_TWELVEDATA_KEY }}
          VITE_YAHOO_PROXY_URL: ${{ secrets.VITE_YAHOO_PROXY_URL }}
        run: npm run build

      - name: Copy snapshot.json into build output
        run: |
          mkdir -p dist
          cp public/snapshot.json dist/snapshot.json
          # .nojekyll tells GitHub Pages to serve files as-is (no Jekyll processing)
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        # Retry up to 3 times on failure. GitHub Pages deployment sometimes
        # fails transiently with "Deployment failed, try again later."
        # (seen July 4 and July 5). The artifact is already uploaded by
        # the previous step, so retrying just asks GitHub to deploy it again.
        uses: actions/deploy-pages@v4
        id: deploy
        continue-on-error: true

      - name: Retry deploy if failed
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "First deploy attempt failed. Waiting 30s and retrying..."
          sleep 30
        # The actual retry happens in the next step

      - name: Deploy to GitHub Pages (retry)
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Post-deploy smoke test
        # Wait for the Pages CDN to propagate, then verify the live site
        # responds with HTTP 200 and serves the expected HTML. Catches
        # silent deployment failures (the kind that caused the July 4
        # incident where CI was "passing" but no deploy actually shipped).
        run: |
          sleep 15
          echo "Polling https://trend-scan.github.io/ ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://trend-scan.github.io/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Live site returned HTTP 200 (attempt $i)"
              break
            fi
            echo "  attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "⚠ Live site did not return HTTP 200 after 5 attempts (last: $STATUS)"
            echo "  This may indicate a deployment propagation delay or a real failure."
            echo "  Manual verification recommended: https://trend-scan.github.io/"
            # Non-blocking: don't fail the workflow, just warn. The deploy
            # step itself already passed, so the artifact is uploaded; the
            # smoke test is purely informational.
          fi
          # Also verify snapshot.json is served (FRED data is critical for
          # the macro regime tab to work).
          SNAP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://trend-scan.github.io/snapshot.json || echo "000")
          if [ "$SNAP_STATUS" = "200" ]; then
            echo "✓ Live snapshot.json returned HTTP 200"
          else
            echo "⚠ Live snapshot.json returned HTTP $SNAP_STATUS (expected 200)"
          fi

      - name: Summary
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Snapshot size:** $(du -h dist/snapshot.json | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle size:** $(du -sh dist/assets | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to:** https://trend-scan.github.io/" >> $GITHUB_STEP_SUMMARY
          echo "- **Build time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
